name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # ── Manual / API-driven runs ──────────────────────────────────
  # Exposes the diff-mode placeholder linter knobs as workflow
  # inputs so operators can re-run the pipeline against any base
  # without touching this file. Defaults reproduce the automatic
  # behaviour for `push` / `pull_request` events; overrides are
  # resolved in the `Resolve placeholder-linter diff base` step
  # below. All inputs flow through the env block on the `lint`
  # job — never read `inputs.*` directly inside `run:` blocks
  # (per GitHub's "untrusted input" hardening guidance).
  workflow_dispatch:
    inputs:
      placeholder_diff_strategy:
        description: >-
          How to pick the diff base for the placeholder linter.
          `auto` mirrors push/PR behaviour (event.before / PR base),
          `full_scan` disables diff mode entirely, `previous_commit`
          uses HEAD~1, `merge_base_main` uses the merge-base with
          origin/main, `custom` uses the value of
          `placeholder_diff_base_ref`.
        type: choice
        required: false
        default: auto
        options:
          - auto
          - full_scan
          - previous_commit
          - merge_base_main
          - custom
      placeholder_diff_base_ref:
        description: >-
          Custom diff base ref (e.g. `origin/release/v5`, a SHA, or
          a tag like `v4.24.0`). Used only when
          `placeholder_diff_strategy` is `custom`. Must be reachable
          from HEAD after `actions/checkout` (this workflow uses
          `fetch-depth: 0`, so any branch / tag / SHA on the remote
          works).
        type: string
        required: false
        default: ""
      placeholder_disable_cache:
        description: >-
          When true, bypass the placeholder-linter PASS cache for
          this run. Useful when re-running to confirm a fix without
          relying on a cached PASS sentinel.
        type: boolean
        required: false
        default: false

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/heads/release/') }}

permissions:
  contents: read

jobs:
  lint:
    name: Linter Scripts Validation
    runs-on: ubuntu-latest
    # ── Workflow-input plumbing ───────────────────────────────────
    # Hoist the three placeholder-linter inputs into the job env so
    # every downstream step reads from `$PLACEHOLDER_*` instead of
    # inlining `${{ inputs.* }}` (which would be a script-injection
    # vector if the input ever held shell metacharacters). For
    # non-`workflow_dispatch` events the inputs are absent, so
    # `||` falls back to the original auto behaviour.
    env:
      PLACEHOLDER_DIFF_STRATEGY: ${{ inputs.placeholder_diff_strategy || 'auto' }}
      PLACEHOLDER_DIFF_BASE_REF: ${{ inputs.placeholder_diff_base_ref || '' }}
      PLACEHOLDER_DISABLE_CACHE: ${{ inputs.placeholder_disable_cache || false }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Diff-based placeholder linting needs the base commit
          # (push: github.event.before, PR: PR base) reachable from
          # HEAD so `git diff <base>...HEAD` works. fetch-depth: 0
          # is the safest blanket choice — the spec tree is small
          # and a full clone still completes in <2s on warm runners.
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Cache Go build and module cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-1.22-${{ hashFiles('linter-scripts/**/*.go') }}
          restore-keys: |
            ${{ runner.os }}-go-1.22-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('linter-scripts/**/*.py') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Verify linter scripts present
        run: |
          test -f linter-scripts/validate-guidelines.go             || { echo "::error::validate-guidelines.go missing"; exit 1; }
          test -f linter-scripts/validate-guidelines.py             || { echo "::error::validate-guidelines.py missing"; exit 1; }
          test -f linter-scripts/check-axios-version.sh             || { echo "::error::check-axios-version.sh missing"; exit 1; }
          test -f linter-scripts/check-spec-folder-refs.py          || { echo "::error::check-spec-folder-refs.py missing"; exit 1; }
          test -f linter-scripts/check-forbidden-spec-paths.sh      || { echo "::error::check-forbidden-spec-paths.sh missing"; exit 1; }
          test -f linter-scripts/check-forbidden-strings.py         || { echo "::error::check-forbidden-strings.py missing"; exit 1; }
          test -f linter-scripts/check-readme-install-section.py    || { echo "::error::check-readme-install-section.py missing"; exit 1; }
          test -f linter-scripts/check-placeholder-comments.py      || { echo "::error::check-placeholder-comments.py missing"; exit 1; }
          test -f linter-scripts/check-prompts-loaded.py            || { echo "::error::check-prompts-loaded.py missing"; exit 1; }
          test -f linter-scripts/forbidden-strings.toml             || { echo "::error::forbidden-strings.toml missing"; exit 1; }

      - name: Run Go validator (spec)
        run: go run linter-scripts/validate-guidelines.go --path spec --max-lines 15

      - name: Run Python validator (spec)
        run: python3 linter-scripts/validate-guidelines.py spec || true

      - name: Run Axios version check
        run: bash linter-scripts/check-axios-version.sh

      - name: Check spec folder references (stale-link guard)
        run: python3 linter-scripts/check-spec-folder-refs.py

      - name: Check forbidden spec paths (re-split + merge-proposal guard)
        run: bash linter-scripts/check-forbidden-spec-paths.sh

      - name: Check forbidden strings (TOML-driven rename guards)
        run: python3 linter-scripts/check-forbidden-strings.py

      - name: Forbidden-strings summary report (on failure)
        # Emits a per-rule digest with the EXACT `sed` command that
        # rewrites every stale match to its canonical replacement.
        # Auto-appends to $GITHUB_STEP_SUMMARY so reviewers see it
        # inline on the PR without opening logs.
        if: failure()
        run: python3 linter-scripts/forbidden-strings-summary.py --markdown

      - name: Check README install section (position + one-line fences)
        # Enforces:
        #   1. "Install in One Line" is the FIRST H2 after the platform badges.
        #   2. Every install/bundle code fence (powershell|bash|sh|pwsh) holds
        #      exactly one bare command — no `#` comments, no blank lines,
        #      no `\` line continuations.
        # Spec: .lovable/memory/constraints/install-command-formatting.md
        run: python3 linter-scripts/check-readme-install-section.py

      - name: Check Lovable prompts loaded (index ↔ .lovable/prompts/* sync)
        # Enforces the "read all prompts before generating code" contract
        # from .lovable/coding-guidelines/coding-guidelines.md by
        # verifying .lovable/prompts.md exists and references every
        # prompt file on disk. Catches orphans + dangling references.
        run: python3 linter-scripts/check-prompts-loaded.py

      - name: Check tunable constants (T1–T4 — single-source-of-truth, seed parity)
        # Enforces the §6 contract in spec/19-main-worker-service/15-tunable-constants.md:
        #   T1 every numeric+unit literal is catalogued or waivered
        #   T2 §2 keys are unique
        #   T3 §4 config.seed.json defaults match §2 catalogue (parity)
        #   T4 MainSessionAbsoluteMaxSeconds >= MainSessionTtlSeconds
        # Wired in v5.38.0 alongside the v2.0.0 backup-tier seed materialization
        # — T3 now covers all 28 MainWorker.Backup.* keys (silent waiver lifted).
        run: python3 linter-scripts/check-tunable-constants.py

      - name: Restore placeholder-linter PASS cache
        # Two-layer safety:
        #   1. The cache key is content-derived from the linter script
        #      itself + every spec/**/*.md, so any edit invalidates it.
        #   2. The script independently recomputes the same fingerprint
        #      from the working tree before trusting any restored
        #      sentinel — a stale or poisoned hit can never let bugs
        #      slip through.
        # On a hit, the next step skips the full spec scan and exits 0
        # in <100ms instead of re-reading every spec file.
        id: placeholder-cache
        # Skip restoring the cache when the operator asked to bypass
        # it (e.g. confirming a fix). `if` short-circuits both the
        # restore *and* the implicit save, so a disable-cache run
        # also can't write a fresh sentinel.
        if: ${{ env.PLACEHOLDER_DISABLE_CACHE != 'true' }}
        uses: actions/cache@v4
        with:
          path: .cache/lint-placeholder
          key: ${{ runner.os }}-placeholder-lint-v1-${{ hashFiles('linter-scripts/check-placeholder-comments.py', 'spec/**/*.md') }}
          # No restore-keys: we deliberately want a strict miss when
          # any input changes — partial restores would be unsafe
          # because the sentinel filename IS the fingerprint.

      - name: Resolve placeholder-linter diff base
        # Picks the right base ref for diff-mode placeholder linting:
        #
        #   strategy = auto             → pull_request: PR base
        #                                 push:         event.before
        #                                 dispatch:     same as push
        #              full_scan        → "" (disable diff mode)
        #              previous_commit  → HEAD~1
        #              merge_base_main  → `git merge-base HEAD
        #                                 origin/main` (falls back to
        #                                 main if no origin remote)
        #              custom           → PLACEHOLDER_DIFF_BASE_REF
        #                                 (rejected if empty)
        #
        # In every strategy the resolved ref is verified to be
        # reachable in the local history. If not, we degrade to
        # full_scan with a `::warning::` rather than failing — the
        # full scan is always correct, just slower.
        #
        # `inputs.*` are read via the job-level env block, never
        # inlined into the script body, so a malicious input value
        # can't break out of the quoted variable expansion.
        id: diff-base
        run: |
          set -euo pipefail
          strategy="${PLACEHOLDER_DIFF_STRATEGY:-auto}"
          base=""
          case "$strategy" in
            full_scan)
              echo "Strategy: full_scan (diff mode disabled by workflow input)"
              ;;
            previous_commit)
              base="HEAD~1"
              # `git rev-parse` resolves the symbolic ref to a SHA
              # so a downstream `git cat-file -e` check works the
              # same way for symbolic and literal inputs.
              base="$(git rev-parse --verify "$base^{commit}" 2>/dev/null || true)"
              ;;
            merge_base_main)
              # Prefer `origin/main` (the remote tracking branch left
              # by actions/checkout); fall back to local `main` for
              # workflows that check out without a remote.
              for ref in origin/main main; do
                if git rev-parse --verify "$ref^{commit}" >/dev/null 2>&1; then
                  base="$(git merge-base HEAD "$ref" || true)"
                  break
                fi
              done
              ;;
            custom)
              ref="${PLACEHOLDER_DIFF_BASE_REF:-}"
              if [[ -z "$ref" ]]; then
                echo "::error::placeholder_diff_strategy=custom requires placeholder_diff_base_ref"
                exit 2
              fi
              base="$(git rev-parse --verify "$ref^{commit}" 2>/dev/null || true)"
              if [[ -z "$base" ]]; then
                echo "::error::custom diff base '$ref' is not a valid ref in the checked-out history"
                exit 2
              fi
              ;;
            auto|"")
              if [[ "${{ github.event_name }}" == "pull_request" ]]; then
                base="${{ github.event.pull_request.base.sha }}"
              else
                base="${{ github.event.before }}"
                if [[ "$base" == "0000000000000000000000000000000000000000" ]]; then
                  base=""
                fi
              fi
              ;;
            *)
              echo "::error::unknown placeholder_diff_strategy '$strategy' (allowed: auto, full_scan, previous_commit, merge_base_main, custom)"
              exit 2
              ;;
          esac
          # Reachability guard: if the resolved ref isn't in the
          # local history (shallow clone, deleted upstream branch,
          # cache-tampering), degrade to a full scan rather than
          # failing. The full scan is always correct, just slower.
          if [[ -n "$base" ]] && ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "::warning::diff base '$base' not in local history — running full scan"
            base=""
          fi
          echo "ref=$base" >> "$GITHUB_OUTPUT"
          echo "strategy=$strategy" >> "$GITHUB_OUTPUT"
          if [[ -n "$base" ]]; then
            echo "Diff base: $base (strategy: $strategy)"
          else
            echo "Diff base: (none — full-tree scan, strategy: $strategy)"
          fi

      - name: Check spec placeholder comments (P-001 … P-008)
        # Validates `<spec-placeholder>` tags and legacy `<!-- TODO: ... -->`
        # placeholder blocks across spec/. Catches malformed bullets,
        # non-imperative wording, missing periods, self-closing tags,
        # empty bodies, duplicate `.md` targets, and missing
        # `@path:line` back-pointer hints BEFORE the cross-link
        # checker runs. Mirrors the pre-commit hook so CI is the source
        # of truth on every push.
        # `--cache-dir` makes repeat runs (e.g. doc-only push series,
        # rebases, retries) skip the scan when nothing relevant
        # changed. Failed runs never write a sentinel, so a fix → break
        # → re-fix loop can't restore a stale PASS.
        # `--diff-base` (when populated) restricts per-file violation
        # reporting to `.md` files actually changed in this push/PR.
        # Cross-file P-007 still walks the full tree so a new bullet
        # in a changed file that collides with an unchanged file is
        # still failed — the optimisation never hides a regression
        # introduced by the current diff. When the base is empty
        # (force-push, new branch, base trimmed by shallow clone) the
        # script falls back to the full-tree scan automatically.
        #
        # Workflow inputs honoured:
        #   * placeholder_diff_strategy / placeholder_diff_base_ref
        #     drive `--diff-base` via the previous step's output.
        #   * placeholder_disable_cache toggles `--cache-dir` so a
        #     re-run can force a full re-scan without poisoning the
        #     stored sentinel.
        run: |
          set -euo pipefail
          base="${{ steps.diff-base.outputs.ref }}"
          args=()
          if [[ -n "$base" ]]; then
            args+=(--diff-base "$base")
          fi
          if [[ "${PLACEHOLDER_DISABLE_CACHE:-false}" != "true" ]]; then
            args+=(--cache-dir .cache/lint-placeholder)
          else
            echo "ℹ️  placeholder cache disabled by workflow input"
          fi
          python3 linter-scripts/check-placeholder-comments.py "${args[@]}"

      - name: Guard release-install.* against /releases/latest calls
        # Static guard: release-install.sh and release-install.ps1 MUST NOT
        # invoke api.github.com or releases/latest. Per
        # spec/14-update/25-release-pinned-installer.md they always run in
        # PINNED MODE and resolve the version from CLI / env / baked-in
        # placeholder only.
        run: bash tests/installer/check-no-latest-api.sh

      - name: release-install.sh exit-code acceptance (spec §F + §AC)
        # Verifies failure modes 1 (no version) and 2 (invalid semver)
        # AND the ratified $INSTALLER_VERSION env-var precedence-2 path.
        # Spec: spec/14-update/25-release-pinned-installer.md §B.2 + §F
        run: bash tests/installer/check-release-install-acceptance.sh

      - name: release.sh bake-output integration (spec §Release-Time Build Step)
        # Runs ./release.sh end-to-end and asserts the baked
        # release-install.{sh,ps1} have no placeholder, carry the
        # resolved tag, and are listed in checksums.txt.
        # Spec: spec/14-update/25-release-pinned-installer.md
        run: bash tests/installer/check-release-bake.sh

      - name: Bundle installer conformance (14 files, spec §3/§7/§8)
        # For every bundle in bundles.json, asserts the .sh/.ps1 pair
        # exists at repo root, parses, has --version/--no-discovery/
        # --no-main-fallback/--use-local-archive/-h/--help (PS1: -Help
        # bridge) plus EXIT CODES doc and the §7 mode banner, and that
        # no line invokes a network client against /releases/latest.
        # Spec: spec/14-update/27-generic-installer-behavior.md
        run: bash tests/installer/check-bundle-installers.sh

      - name: Root installer §27 conformance (install.sh / install.ps1 / linters-cicd)
        # Asserts root + linters-cicd installers expose --no-discovery,
        # --no-main-fallback, --offline (--use-local-archive), the §7
        # banner with mode:/source: lines, and the §8 EXIT CODES header.
        # Spec: spec/14-update/27-generic-installer-behavior.md
        run: bash tests/installer/check-root-install-acceptance.sh

      - name: BOOL-NEG-001 unit tests (linters-cicd)
        # Stdlib unittest suite that locks in the BOOL-NEG-001 v1
        # contract verified end-to-end through run-all.sh in v4.11.0
        # (closes pending-issue #01). Covers forbidden Is/Has + Not/No
        # combinations, the 10-name allow-list, positive forms, v1
        # out-of-scope boundary (Cannot/Disabled/Un-/In-/Dis- — task
        # #07 territory), and structural edge cases (multiple tables,
        # comments, empty input).
        run: python3 linters-cicd/tests/run.py

      - name: BOOL-NEG-001 pipeline smoke test (run-all.sh end-to-end)
        # Closes .lovable/resolved-issues/01-bool-neg-001-pipeline-untested.md
        # and pending-suggestion #04. Runs the BOOL-NEG-001 SQL check
        # through the full orchestrator (registry → check → SARIF merge)
        # and asserts: 4 findings on forbidden Is/Has + Not/No prefixes,
        # 10-name allow-list silently passes, no rule-id collision with
        # the synthetic STYLE-099 finding.
        run: bash tests/pipeline/check-bool-neg-001-pipeline.sh

      - name: Orchestrator flags smoke test (--strict / --total-timeout / --split-by)
        # Closes plan item #11 + pending-suggestion #13. Validates the
        # v4.24.0 flags end-to-end against the real repo:
        # 1) --total-timeout watchdog cancels on fast completion
        # 2) --total-timeout watchdog fires on forced timeout
        # 3) --split-by severity writes per-severity SARIF siblings
        # 4) --strict rejects unknown TOML keys
        run: bash tests/pipeline/check-orchestrator-flags.sh

  codegen:
    name: Codegen (Rule 9 inverted-fields)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── Path filter ──────────────────────────────────────────────
      # Only run the codegen verification when files that can affect
      # the generated output have changed. Push events to main always
      # run (no `base` available for diffing), so main stays trusted.
      - name: Detect codegen-relevant changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          # On push events, paths-filter uses the previous commit as
          # base automatically. On PRs it diffs against the PR base.
          filters: |
            codegen:
              - 'linters-cicd/codegen/**'
              - 'linters-cicd/tests/test_codegen_*.py'
              - 'linters-cicd/tests/test_codegen_determinism_harness.py'
              - '.github/workflows/ci.yml'

      # ── Determinism check (always re-runs codegen, compares to expected/) ──
      - name: Verify codegen determinism
        if: steps.changes.outputs.codegen == 'true' || github.event_name == 'push'
        # Re-runs inverted-field codegen on committed source fixtures and
        # diffs the output byte-for-byte against committed expected/
        # artifacts. Backed by round-trip + bijection guarantees proven
        # in test_codegen_inversion_table.py.
        # On drift: `npm run codegen:regen` locally and commit.
        run: bash linters-cicd/codegen/scripts/verify-codegen-determinism.sh

      # ── Regen-diff guard (catches uncommitted regen output) ──
      # Even if verify-determinism passes, an author may have edited a
      # source fixture without re-running regen. This step regenerates
      # in-place and fails if the working tree drifts from the index.
      - name: Regen-diff guard (no uncommitted codegen output)
        if: steps.changes.outputs.codegen == 'true' || github.event_name == 'push'
        run: |
          bash linters-cicd/codegen/scripts/regen-codegen-fixtures.sh
          if ! git diff --exit-code --stat -- linters-cicd/codegen/fixtures/expected/; then
            echo ""
            echo "::error::Codegen drift detected — fixtures/expected/ is out of sync with sources/."
            echo "::error::Fix: run 'npm run codegen:regen' locally and commit the regenerated files."
            echo ""
            echo "--- Full diff ---"
            git diff -- linters-cicd/codegen/fixtures/expected/
            exit 1
          fi
          echo "✅ Codegen fixtures are in sync."

      - name: Skipped — no codegen-relevant files changed
        if: steps.changes.outputs.codegen != 'true' && github.event_name == 'pull_request'
        run: |
          echo "ℹ️ No changes under linters-cicd/codegen/** — verification skipped for this PR."
          echo "   (Pushes to main always run the full codegen verification.)"

  cross-links:
    name: Spec Cross-Reference Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify checker present
        run: |
          test -f linter-scripts/check-spec-cross-links.py \
            || { echo "::error::check-spec-cross-links.py missing"; exit 1; }

      - name: Validate spec internal cross-references
        # Walks spec/, parses every markdown link, fails on any broken link
        # or missing heading anchor. Waivers live in
        # linter-scripts/spec-cross-links.allowlist (baseline).
        run: |
          python3 linter-scripts/check-spec-cross-links.py \
            --root spec \
            --repo-root . \
            --github

      - name: Upload JSON report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spec-cross-links-report
          path: /tmp/spec-cross-links-report.json
          if-no-files-found: ignore

      - name: Suggest auto-fixes for broken links (advisory)
        # Companion step that runs the fuzzy-match suggester. Always exits 0
        # (advisory only — never blocks merge). Surfaces suggestions as
        # GitHub annotations so reviewers see proposed fixes inline on the
        # PR diff. Use `python3 linter-scripts/suggest-spec-cross-link-fixes.py
        # --apply` locally to rewrite files when confidence >= 0.82.
        if: always()
        run: |
          python3 linter-scripts/suggest-spec-cross-link-fixes.py \
            --root spec \
            --repo-root . \
            --github \
            --json > /tmp/spec-cross-links-suggestions.json || true
          echo "--- Human-readable summary ---"
          python3 linter-scripts/suggest-spec-cross-link-fixes.py \
            --root spec \
            --repo-root . || true

      - name: Upload suggestions JSON
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: spec-cross-links-suggestions
          path: /tmp/spec-cross-links-suggestions.json
          if-no-files-found: ignore

  sync-drift:
    name: Sync Drift Check (all generated files)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies (no scripts)
        # --ignore-scripts skips lifecycle hooks like postinstall — we only
        # need the workspace populated so the sync scripts can run. The
        # sync scripts themselves use only Node built-ins, so we don't
        # actually need any npm packages installed; this is here in case
        # future sync scripts depend on a package.
        run: npm ci --ignore-scripts --no-audit --no-fund
        continue-on-error: true

      - name: Check sync drift (all generated files)
        # Single source of truth for drift detection. The script itself
        # documents which files it watches, normalises volatile fields
        # (version.json git/updated, health-score.json generated,
        # readme UPDATED stamp), and prints the exact `npm run sync`
        # command operators must run on failure.
        #
        # Local fix workflow:
        #   npm run sync:fix      # regenerate everything in place
        #   git add -A && git commit -m "chore: sync generated files"
        run: npm run sync:check

      - name: Check Mermaid diagram drift (PNG vs .mmd; opt-in adoption)
        # Mirror of scripts/lint-ci.sh step 14. Uses node built-ins only —
        # passes when no PNGs exist (adoption is opt-in per
        # spec/19-main-worker-service/diagrams/readme.md), fails only when
        # a committed *.png is older than its *.mmd source. Closes
        # spec/19 audit-09 §2.2 end-to-end (local + CI parity).
        run: node scripts/render-diagrams.mjs --check

  docs-diagrams:
    name: Docs Build — Render Mermaid Diagrams
    runs-on: ubuntu-latest
    needs: sync-drift
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Discover .mmd files
        id: discover
        run: |
          set -euo pipefail
          count=$(find spec -type f -name '*.mmd' 2>/dev/null | wc -l | tr -d ' ')
          echo "count=$count" >> "$GITHUB_OUTPUT"
          echo "Found $count .mmd file(s)."

      - name: Install Mermaid CLI
        if: steps.discover.outputs.count != '0'
        # Pin a known-good version of mermaid-cli to keep CI deterministic.
        # `npx --yes @mermaid-js/mermaid-cli` would also work, but a direct
        # install lets us cache the global node_modules between runs.
        run: npm install --no-save --no-audit --no-fund @mermaid-js/mermaid-cli@10.9.1

      - name: Render Mermaid → PNG (all spec/**/{diagrams,images}/*.mmd)
        if: steps.discover.outputs.count != '0'
        # Uses scripts/puppeteer-ci.json for `--no-sandbox` so headless
        # Chrome boots inside the GitHub-hosted runner. Re-renders only
        # files where the PNG is missing or older than its .mmd source
        # (idempotent — fast no-op when nothing changed).
        run: node scripts/render-diagrams.mjs

      - name: Verify no drift after render
        if: steps.discover.outputs.count != '0'
        # Defence-in-depth: after rendering, the --check pass must be
        # clean. If this fails, the renderer itself is buggy.
        run: node scripts/render-diagrams.mjs --check

      - name: Upload rendered PNGs as artifact
        if: always() && steps.discover.outputs.count != '0'
        uses: actions/upload-artifact@v4
        with:
          name: spec-diagrams-png
          path: spec/**/*.png
          if-no-files-found: ignore
          retention-days: 14

  runner-dispatch-guard:
    name: Runner Dispatch Guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run guard fixture suite (positive + negative)
        run: bash tests/installer/check-runner-dispatch-guard-fixtures.sh

      - name: Run guard against real run.sh / run.ps1 (emit report)
        env:
          RUNNER_GUARD_REPORT: ${{ github.workspace }}/reports/runner-guard-report.md
        run: bash linter-scripts/check-runner-dispatch-antipatterns.sh

      - name: Publish report to GitHub Step Summary
        if: always()
        run: |
          if [ -f reports/runner-guard-report.md ]; then
            cat reports/runner-guard-report.md >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload runner-guard-report.md
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runner-guard-report
          path: reports/runner-guard-report.md
          if-no-files-found: warn
