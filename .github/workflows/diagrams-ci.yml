name: Diagrams CI

on:
  pull_request:
    paths:
      - 'spec/**/*.mmd'
      - 'spec/**/*.png'
      - 'scripts/validate-mermaid.mjs'
      - 'scripts/render-diagrams.mjs'
      - 'scripts/regen-diagrams-and-audit.mjs'
      - 'package.json'
      - '.github/workflows/diagrams-ci.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  diagrams:
    name: Validate, render & drift-check Mermaid diagrams
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Headless Chromium dependencies for mermaid PNG rendering (puppeteer).
      - name: Install Chromium system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 libnspr4 \
            libxshmfence1 fonts-liberation

      - name: Prepare CI log directory
        run: mkdir -p .ci-logs/diagrams .cache

      # Warm-cache: restore the SHA-256 render cache from a previous run so
      # unchanged .mmd sources skip the (slow) Chromium boot. The cache key
      # is keyed on every .mmd source + the render script itself, so any
      # change invalidates the exact-match key but `restore-keys` still
      # provides a usable partial match (per-source skip remains valid
      # because isCacheHit() re-verifies content hash at use time).
      - name: Restore diagram render cache
        id: diagrams-cache
        uses: actions/cache@v4
        with:
          path: .cache/diagrams-hashes.json
          key: diagrams-hashes-${{ runner.os }}-${{ hashFiles('spec/**/*.mmd', 'scripts/render-diagrams.mjs') }}
          restore-keys: |
            diagrams-hashes-${{ runner.os }}-

      # Step 1 — Parse-validate every .mmd against mermaid v11 grammar.
      - name: Validate Mermaid sources (mermaid v11 parse)
        id: validate
        run: |
          set -o pipefail
          bun run diagrams:validate 2>&1 | tee .ci-logs/diagrams/validate.log

      # Step 2 — Render all diagrams to PNG (writes alongside .mmd sources).
      - name: Render diagrams to PNG
        id: render
        run: |
          set -o pipefail
          bun run diagrams:render 2>&1 | tee .ci-logs/diagrams/render.log

      # Step 3 — Drift-check: fail if rendered PNGs differ from committed baseline.
      - name: Drift-check committed PNGs vs freshly rendered
        id: drift
        run: |
          set -o pipefail
          bun run diagrams:check 2>&1 | tee .ci-logs/diagrams/drift-check.log

      # Always-on: capture the working-tree diff vs committed baseline so
      # PNG drift (and any unexpected .mmd churn) is reviewable as an artifact.
      - name: Capture git diff vs baseline
        if: always()
        run: |
          {
            echo "=== git status (porcelain) ==="
            git status --porcelain
            echo
            echo "=== git diff --stat (working tree vs HEAD) ==="
            git diff --stat -- 'spec/**/*.png' 'spec/**/*.mmd' || true
            echo
            echo "=== git diff (text-only sources) ==="
            git diff -- 'spec/**/*.mmd' || true
          } > .ci-logs/diagrams/git-diff.log
          # Binary-aware diff for PNGs (lists changed PNGs without huge blobs).
          git diff --binary --stat -- 'spec/**/*.png' \
            > .ci-logs/diagrams/png-diff.stat 2>&1 || true

      - name: Summarise failure for the PR check
        if: failure()
        run: |
          {
            echo "## Diagrams CI — failure summary"
            echo
            echo "- validate: ${{ steps.validate.outcome }}"
            echo "- render:   ${{ steps.render.outcome }}"
            echo "- drift:    ${{ steps.drift.outcome }}"
            echo
            echo "Full logs are attached as the \`diagrams-ci-logs\` artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload diagrams CI logs and diff (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagrams-ci-logs
          path: .ci-logs/diagrams/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload rendered diagrams (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: rendered-diagrams
          path: |
            spec/**/diagrams/*.png
            spec/**/images/*.png
          if-no-files-found: ignore
          retention-days: 7

