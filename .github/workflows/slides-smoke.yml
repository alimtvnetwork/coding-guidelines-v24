name: slides-smoke

on:
  pull_request:
    paths:
      - "slides-app/**"
      - "playwright.config.ts"
      - ".github/workflows/slides-smoke.yml"
  push:
    branches: [main]
    paths:
      - "slides-app/**"
      - "playwright.config.ts"
      - ".github/workflows/slides-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install root deps (Playwright)
        run: bun install --frozen-lockfile

      - name: Install slides-app deps
        working-directory: slides-app
        run: bun install --frozen-lockfile

      - name: Build slides-app
        working-directory: slides-app
        run: bun run build

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run slides smoke test
        run: bunx playwright test slides-app/tests/smoke.spec.ts

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7
