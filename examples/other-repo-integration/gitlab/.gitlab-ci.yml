# ────────────────────────────────────────────────────────────────────────
#  Coding-Guidelines Linter Pack — GitLab CI starter for external repos
#  Pack version targeted: v3.79.0
#
#  What it does:
#    1. Installs the linter pack into the job workspace
#    2. Runs run-all.sh which emits SARIF 2.1.0
#    3. Uploads SARIF as a SAST report (renders in MR widget)
#
#  Replace `latest` with a pinned tag for production (see README Step 5).
# ────────────────────────────────────────────────────────────────────────

stages:
  - quality

coding-guidelines:
  stage: quality
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends curl unzip
    - curl -fsSL https://github.com/alimtvnetwork/coding-guidelines-v22/releases/latest/download/install.sh | bash
  script:
    - bash ./linters-cicd/run-all.sh
        --path .
        --format sarif
        --output coding-guidelines.sarif
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - coding-guidelines.sarif
    reports:
      sast: coding-guidelines.sarif
  allow_failure: false
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH